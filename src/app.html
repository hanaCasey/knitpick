<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#f4e9e1" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="description" content="personal knitting helper — patterns, row counters, progress log" />
		<!-- __PUBLIC_URL__ is replaced with the real origin by scripts/deploy.sh -->
		<meta property="og:title" content="knitpick" />
		<meta property="og:description" content="personal knitting helper — patterns, row counters, progress log" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="__PUBLIC_URL__/" />
		<meta property="og:image" content="__PUBLIC_URL__/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="knitpick — a cat-shaped ball of yarn" />
		<meta name="twitter:card" content="summary_large_image" />
		<title>knitpick</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
