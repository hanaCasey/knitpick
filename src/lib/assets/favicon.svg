    <line x1="122" y1="278" x2="178" y2="286"/>
    <line x1="126" y1="318" x2="180" y2="310"/>
    <line x1="390" y1="278" x2="334" y2="286"/>
    <line x1="386" y1="318" x2="332" y2="310"/>
